<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /* --- Monarch ERP Global Variables --- */
        :root {
            --sidebar-width: 260px;
            --brand-color: #0d6efd;
            --bg-soft: #f8f9fa;
            --card-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075);
            --sidebar-bg: #212529;
        }

.sidebar-logo {
    height: 30px;
    width: auto;
    object-fit: contain;
    vertical-align: middle;

    /* --- Rounded Corner Logic --- */
    border-radius: 6px;         /* Adjust this number for more or less curve */
    border: 1px solid rgb(18, 18, 18); /* Optional: adds a subtle border so it pops */
    background-color: #5e5252;     /* Optional: if your logo has a transparent background but you want a white rounded box behind it */
    padding: 2px;               /* Optional: gives the logo a little "breathing room" inside the box */
}

.brand-text {
    font-size: 1.1rem;
    font-weight: 700;
    white-space: nowrap; /* Prevents "ERP" from dropping to a second line */
}

/* Ensure the brand container doesn't grow too large */
.brand {
    overflow: hidden;
    height: 40px;
    display: flex;
    align-items: center;
}
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* --- Base Layout --- */
        html, body { height: 100%; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-soft); }

        .app-shell {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            min-height: 100vh;
        }

        /* --- Sidebar Fragment Styles --- */
        .sidebar {
            background: var(--sidebar-bg);
            color: #fff;
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 1rem;
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
        }

        .sidebar .brand { font-weight: 700; letter-spacing: 0.3px; font-size: 1.25rem; }
        .sidebar .nav-link {
            color: #adb5bd;
            border-radius: .375rem;
            padding: 0.8rem 1rem;
            transition: all 0.2s;
        }

        .sidebar .nav-link.active, .sidebar .nav-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }

        /* --- Main Content & Topbar --- */
        .main { padding: 0; display: flex; flex-direction: column; }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 1030;
            background: #fff;
            border-bottom: 1px solid #e9ecef;
        }

        .topbar .container-fluid { padding: .75rem 1rem; }

        /* --- Global Component Styles --- */
        .card { border: none; box-shadow: var(--card-shadow); border-radius: 0.5rem; }
        .table thead { background-color: #f1f3f5; }
        .text-muted-small { color: #6c757d; font-size: .875rem; }

        /* --- Status Indicators --- */
        .status-pill { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-instock { background-color: #198754; }
        .status-low { background-color: #fd7e14; }
        .status-out { background-color: #dc3545; }

        /* --- Responsive Adjustments --- */
        @media (max-width: 992px) {
            .app-shell { grid-template-columns: 1fr; }
            .sidebar {
                position: fixed;
                left: -100%;
                width: var(--sidebar-width);
                transition: left .25s ease;
                z-index: 1040;
            }
            .sidebar.open { left: 0; }
        }
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="brand d-flex align-items-centern gap-1">
            <img src="/logo.png" alt="Monarch Logo" class="sidebar-logo">
            <i class="fa-solid text-warning"></i>
            <span>Monarch ERP</span>
        </div>
        <button class="btn btn-sm btn-outline-light d-lg-none" id="toggleSidebar">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <ul class="nav nav-pills flex-column gap-1">
        <li class="nav-item">
            <a href="/products" class="nav-link ${pageContext.request.requestURI.contains('products') ? 'active' : ''}">
                <i class="fas fa-box me-2"></i> Products
            </a>
        </li>
        <li class="nav-item">
            <a href="/variants" class="nav-link ${pageContext.request.requestURI.contains('variants') ? 'active' : ''}">
                <i class="fas fa-tags me-2"></i> Variants
            </a>
        </li>
        <li class="nav-item">
            <a href="/inventory" class="nav-link ${pageContext.request.requestURI.contains('inventory') ? 'active' : ''}">
                <i class="fas fa-warehouse me-2"></i> Inventory
            </a>
        </li>
        <li class="nav-item">
            <a href="/stockmaster" class="nav-link ${pageContext.request.requestURI.contains('stockmaster') ? 'active' : ''}">
                <i class="fas fa-chart-line me-2"></i> Stock Master
            </a>
        </li>
        <li class="nav-item">
            <a href="/purchase" class="nav-link ${pageContext.request.requestURI.endsWith('/purchase') ? 'active' : ''}">
                <i class="fas fa-shopping-cart me-2"></i> Purchase
            </a>
        </li>

        <li class="nav-item">
            <a href="/contact" class="nav-link ${pageContext.request.requestURI.contains('contact') ? 'active' : ''}">
                <i class="fas fa-address-book me-2"></i> Contact
            </a>
        </li>

        <li class="nav-item">
            <a href="/purchase/report" class="nav-link ${pageContext.request.requestURI.contains('report') ? 'active' : ''}">
                <i class="fas fa-file-alt me-2"></i> Report
            </a>
        </li>

        <li class="nav-item">
            <a href="/customer" class="nav-link ${pageContext.request.requestURI.contains('customer') ? 'active' : ''}">
                <i class="fas fa-file-alt me-2"></i> Customer
            </a>
        </li>

        <li class="nav-item">
            <a href="/salesinvoice" class="nav-link ${pageContext.request.requestURI.contains('sales') ? 'active' : ''}">
                <i class="fas fa-file-alt me-2"></i> Sales
            </a>
        </li>

        <li class="nav-item">
        <a href="#" onclick="logout()" class="nav-link">
            <i class="fas fa-sign-out-alt me-2"></i> Logout
        </a>
    </li>
    </ul>
    <hr class="border-secondary my-4">
    <div class="text-muted-small text-center">
        v1.0 Monarch ERP
    </div>
</nav>

<script>
    function logout() {
        fetch('/logout', {
            method: 'POST'
        }).then(() => {
            window.location.href = '/login';
        });
    }
</script>

</body>
</html>
